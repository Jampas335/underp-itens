<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>underRP Progression Map</title>
<link rel="icon" href="./under-icon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Barlow+Condensed:wght@500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xyflow/react@12.3.5/dist/style.css">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div id="boot-status" class="boot-status">Carregando mapa economico...</div>
    <div id="root"></div>
    <script>
        window.addEventListener("error", function (event) {
            var target = document.getElementById("boot-status");
            if (target) target.textContent = "Erro ao carregar: " + event.message;
        });
        window.addEventListener("unhandledrejection", function (event) {
            var target = document.getElementById("boot-status");
            var reason = event.reason && event.reason.message ? event.reason.message : String(event.reason || "erro desconhecido");
            if (target) target.textContent = "Erro ao carregar: " + reason;
        });
    </script>
    <script type="module" src="./app.js"></script>
</body>
</html>
